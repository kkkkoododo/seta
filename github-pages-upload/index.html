<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1d4f5f">
    <title>接待交際費管理</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="概要">
        <div>
          <p class="eyebrow">CSV出力対応</p>
          <h1>接待交際費管理</h1>
        </div>
        <div class="summary" aria-live="polite">
          <span>件数 <strong id="count">0</strong></span>
          <span>合計 <strong id="total">0円</strong></span>
        </div>
      </section>

      <section class="entry-panel" aria-label="取引入力">
        <form id="expense-form" autocomplete="off">
          <div class="field">
            <label for="date">日付</label>
            <input id="date" name="date" type="date" required>
          </div>

          <fieldset class="payment-field">
            <legend>支払い</legend>
            <div class="payment-options">
              <label>
                <input type="radio" name="payment" value="現金" checked>
                <span>現金</span>
              </label>
              <label>
                <input type="radio" name="payment" value="カード">
                <span>カード</span>
              </label>
              <label>
                <input type="radio" name="payment" value="その他">
                <span>その他</span>
              </label>
            </div>
          </fieldset>

          <div class="field">
            <label for="amount">金額</label>
            <input id="amount" name="amount" type="number" min="1" inputmode="numeric" required>
          </div>

          <div class="field">
            <label for="place">場所</label>
            <input id="place" name="place" type="text" required>
          </div>

          <div class="field memo-field">
            <label for="memo">メモ</label>
            <input id="memo" name="memo" type="text">
          </div>

          <div class="actions">
            <button class="primary" type="submit">追加</button>
            <button id="export-csv" type="button">CSV出力</button>
            <button id="backup-json" type="button">バックアップ</button>
            <label class="import-button" for="import-json">復元</label>
            <input id="import-json" type="file" accept="application/json,.json">
          </div>
        </form>
      </section>

      <section class="records-panel" aria-label="取引一覧">
        <div class="panel-heading">
          <h2>入力履歴</h2>
          <button id="clear-all" class="danger" type="button">全削除</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>取引No</th>
                <th>取引日</th>
                <th>支払い</th>
                <th>金額</th>
                <th>場所</th>
                <th>メモ</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>
        <div id="records-cards" class="records-cards"></div>
        <p id="empty-state" class="empty-state">まだ入力はありません。</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
